name: Metric Calculation Validation

on:
  pull_request:
    branches: [ main ] # Trigger specifically when targeting the developer branch

jobs:
  validate-metrics:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          path: pr-branch  # This creates a temp folder named 'pr-branch'

      - name: Checkout main Branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: base-branch # This creates a temp folder named 'base-branch'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # 1. Install uv
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # 2. Install dependencies using uv
      - name: Install Dependencies
        run: |
          # We sync using the lockfile in your PR branch
          uv sync --project pr-branch

      # 3. Run validation using 'uv run'
      - name: Run Validation
        run: |
          # 'uv run' ensures the script uses the virtual environment created above
          uv run python pr-branch/validate_metrics.py
        
      - name: Comment and Fail PR
        if: failure()
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
          --body "❌ **Metric Validation Failed**: The results on this branch differ from the 'developer' branch. Merge is blocked."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
