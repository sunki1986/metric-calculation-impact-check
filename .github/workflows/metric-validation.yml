name: Metric Calculation Validation

on:
  pull_request:
    branches: [ main ] # Trigger specifically when targeting the developer branch

jobs:
  validate-metrics:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          path: pr-branch

      - name: Checkout main Branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: base-branch

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          # This installs fastapi, pydantic, etc. from your pr-branch files
          uv sync --project pr-branch

      - name: Run Validation
        run: |
          # 'uv run' now uses the environment created in the previous step
          uv run --project pr-branch python pr-branch/validate_metrics.py
        
      - name: Comment and Fail PR
        if: failure()
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
          --body "❌ **Metric Validation Failed**: The results on this branch differ from the **main** branch. Merge is blocked."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
